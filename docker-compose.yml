services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: bttrlistings
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: bttrlistings
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bttrlistings"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${PORT:-8080}:8080"
    environment:
      DATABASE_URL: postgres://bttrlistings:${POSTGRES_PASSWORD}@postgres:5432/bttrlistings?sslmode=disable
      JWT_SECRET: ${JWT_SECRET}
      OLLAMA_HOST: ${OLLAMA_HOST}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-gemma4:27b}
      PORT: 8080
      SCRAPER_URLS: ${SCRAPER_URLS:-}
      ALERT_WEBHOOK_URL: ${ALERT_WEBHOOK_URL:-}

volumes:
  postgres_data:
